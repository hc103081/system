<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>📱 背景監控中控台</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #1e1e1e;
            color: white;
            padding: 20px;
        }

        .card {
            background: #2d2d2d;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .title {
            color: #4CAF50;
            margin-top: 0;
        }

        .info {
            margin: 8px 0;
            font-size: 16px;
        }

        .offline {
            color: #f44336;
        }

        .online {
            color: #4CAF50;
        }

        .warning {
            color: #FFC107;
        }

        button {
            padding: 8px 15px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-update {
            background-color: #2196F3;
            color: white;
        }

        .btn-stop {
            background-color: #f44336;
            color: white;
        }

        .btn-disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        input[type=number] {
            padding: 6px;
            width: 60px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>
    <h1>🚀 設備狀態中控台</h1>
    <div id="device-container">載入中...</div>

    <script>
        // 儲存正在等待指令確認的狀態
        const waitingStates = {};

        async function fetchStatus() {
            try {
                const response = await fetch('/api/status?t=' + new Date().getTime());
                const data = await response.json();
                const container = document.getElementById('device-container');

                if (Object.keys(data).length === 0) {
                    container.innerHTML = '<p>尚未有設備連線...</p>';
                    return;
                } else if (container.innerHTML.includes('尚未有設備連線')) {
                    container.innerHTML = ''; // 清除空提示
                }

                for (const [deviceId, info] of Object.entries(data)) {
                    const currentInterval = parseInt(info.photoInterval) || 60;

                    // 檢查等待狀態
                    if (waitingStates[deviceId]) {
                        const waitInfo = waitingStates[deviceId];
                        const now = new Date().getTime();

                        if (waitInfo.expectedInterval === currentInterval) {
                            delete waitingStates[deviceId];
                        } else if (waitInfo.isStopping && info.isStopping) {
                            delete waitingStates[deviceId];
                        } else if (now - waitInfo.timestamp > 90000) {
                            delete waitingStates[deviceId];
                        }
                    }

                    // 處理自毀狀態
                    if (info.isStopping) {
                        renderDeviceCard(container, deviceId, info, currentInterval, "🔴 設備已接受自毀指令並徹底停止", "offline");
                        continue;
                    }

                    const lastUpdateTime = new Date(info.lastUpdate).getTime();
                    const isOffline = (new Date().getTime() - lastUpdateTime) > (3 * 60 * 1000);
                    const statusText = isOffline ? '⚠️ 離線 (超過 3 分鐘未回應)' : '🟢 運作正常';
                    const statusColor = isOffline ? 'offline' : 'online';

                    renderDeviceCard(container, deviceId, info, currentInterval, statusText, statusColor);
                }
            } catch (error) { console.error("無法取得狀態:", error); }
        }

        function renderDeviceCard(container, deviceId, info, currentInterval, statusText, statusColor) {
            let card = document.getElementById(`card_${deviceId}`);

            // 💥 關鍵修正 1：卡片與輸入框「只建立一次」，絕不重複渲染干擾打字
            if (!card) {
                card = document.createElement('div');
                card.id = `card_${deviceId}`;
                card.className = 'card';
                card.innerHTML = `
            <h2 class="title">設備: ${info.deviceName}</h2>
            <p class="info"><strong>狀態:</strong> <span id="status_${deviceId}"></span></p>
            <p class="info"><strong>電量:</strong> <span id="battery_${deviceId}"></span>% | <strong>上傳:</strong> <span id="upload_${deviceId}"></span> 張</p>
            <hr style="border-color: #444;">
            <p class="info"><strong>當前拍照頻率:</strong> <span id="interval_text_${deviceId}"></span></p>
            
            <input type="number" id="interval_input_${deviceId}" min="5"> 秒
            <button id="btn_update_${deviceId}" onclick="sendIntervalCmd('${deviceId}')">更新頻率</button>
            
            <button id="btn_stop_${deviceId}" class="btn-stop" onclick="confirmStop('${deviceId}')" style="float: right;">🛑 遠端停止</button>
        `;
                container.appendChild(card);
                // 只在第一次連線時，給予輸入框預設值
                document.getElementById(`interval_input_${deviceId}`).value = currentInterval;
            }

            // 準備要更新的文字與狀態
            const waitInfo = waitingStates[deviceId];
            const isWaitingInterval = waitInfo && waitInfo.expectedInterval;
            const isWaitingStop = waitInfo && waitInfo.isStopping;

            if (isWaitingStop) {
                statusText = '⏳ 等待自毀指令送達...';
                statusColor = 'warning';
            }

            const intervalText = isWaitingInterval
                ? `<span class="warning">⏳ 等待送達 (${currentInterval}s ➔ ${waitInfo.expectedInterval}s)</span>`
                : `${currentInterval} 秒`;

            const isDisabled = isWaitingInterval || isWaitingStop;

            // 💥 關鍵修正 2：精準更新文字節點，不動到 Input 框
            const statusEl = document.getElementById(`status_${deviceId}`);
            statusEl.innerHTML = statusText;
            statusEl.className = statusColor;

            document.getElementById(`battery_${deviceId}`).innerText = info.batteryLevel;
            document.getElementById(`upload_${deviceId}`).innerText = info.uploadCount;
            document.getElementById(`interval_text_${deviceId}`).innerHTML = intervalText;

            // 更新按鈕與輸入框的禁用狀態 (Disabled)
            const inputEl = document.getElementById(`interval_input_${deviceId}`);
            const btnUpdate = document.getElementById(`btn_update_${deviceId}`);
            const btnStop = document.getElementById(`btn_stop_${deviceId}`);

            inputEl.disabled = isDisabled;
            btnUpdate.disabled = isDisabled;
            btnStop.disabled = isDisabled;

            btnUpdate.className = isDisabled ? 'btn-disabled' : 'btn-update';
        }

        // 輔助函數：取得輸入框數值並發送指令
        function sendIntervalCmd(deviceId) {
            const val = document.getElementById(`interval_input_${deviceId}`).value;
            sendCommand(deviceId, 'SET_INTERVAL', val);
        }

        async function sendCommand(deviceId, command, value) {
            if (command === 'SET_INTERVAL') {
                waitingStates[deviceId] = { expectedInterval: parseInt(value), timestamp: new Date().getTime() };
            } else if (command === 'STOP_SERVICE') {
                waitingStates[deviceId] = { isStopping: true, timestamp: new Date().getTime() };
            }

            await fetch('/api/command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ deviceId, command, value })
            });
            fetchStatus();
        }

        function confirmStop(deviceId) {
            if (confirm("⚠️ 確定要發送終極自毀指令嗎？App 將徹底停止並關閉。")) {
                sendCommand(deviceId, 'STOP_SERVICE', '');
            }
        }

        fetchStatus();
        setInterval(fetchStatus, 3000);
    </script>
</body>

</html>
