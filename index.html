<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>📱 背景監控中控台</title>
    <style>
        body { font-family: sans-serif; background-color: #1e1e1e; color: white; padding: 20px; }
        .card { background: #2d2d2d; border-radius: 10px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .title { color: #4CAF50; margin-top: 0; }
        .info { margin: 8px 0; font-size: 16px; }
        .offline { color: #f44336; } .online { color: #4CAF50; } .warning { color: #FFC107; }
        button { padding: 8px 15px; margin-top: 10px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
        .btn-update { background-color: #2196F3; color: white; }
        .btn-stop { background-color: #f44336; color: white; }
        .btn-disabled { background-color: #555; cursor: not-allowed; }
        input[type=number] { padding: 6px; width: 60px; border-radius: 4px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>🚀 設備狀態中控台</h1>
    <div id="device-container">載入中...</div>

    <script>
        // 儲存正在等待指令確認的狀態
        const waitingStates = {};

        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                const container = document.getElementById('device-container');
                container.innerHTML = '';

                if (Object.keys(data).length === 0) {
                    container.innerHTML = '<p>尚未有設備連線...</p>';
                    return;
                }

                for (const [deviceId, info] of Object.entries(data)) {
                    // 檢查是否收到最後遺言
                    if (info.isStopping) {
                        renderDeviceCard(container, deviceId, info, "🔴 設備已接受自毀指令並停止運作", "offline");
                        continue;
                    }

                    const lastUpdateTime = new Date(info.lastUpdate).getTime();
                    const isOffline = (new Date().getTime() - lastUpdateTime) > (3 * 60 * 1000);
                    const statusText = isOffline ? '⚠️ 離線 (超過 3 分鐘未回應)' : '🟢 運作正常';
                    const statusColor = isOffline ? 'offline' : 'online';

                    // 確認指令是否已送達 (App 回報的頻率 == 我們期望的頻率)
                    if (waitingStates[deviceId] && waitingStates[deviceId].expectedInterval == info.photoInterval) {
                        delete waitingStates[deviceId]; // 指令已送達，解除等待狀態
                    }

                    renderDeviceCard(container, deviceId, info, statusText, statusColor);
                }
            } catch (error) { console.error("無法取得狀態:", error); }
        }

        function renderDeviceCard(container, deviceId, info, statusText, statusColor) {
            const isWaiting = waitingStates[deviceId] !== undefined;
            const intervalText = isWaiting ? `<span class="warning">⏳ 等待指令送達 (${info.photoInterval}s -> ${waitingStates[deviceId].expectedInterval}s)</span>` : `${info.photoInterval} 秒`;
            const disabledAttr = isWaiting ? 'disabled' : '';
            const btnClass = isWaiting ? 'btn-disabled' : 'btn-update';

            const card = `
                <div class="card">
                    <h2 class="title">設備: ${info.deviceName}</h2>
                    <p class="info"><strong>狀態:</strong> <span class="${statusColor}">${statusText}</span></p>
                    <p class="info"><strong>電量:</strong> ${info.batteryLevel}% | <strong>上傳:</strong> ${info.uploadCount} 張</p>
                    <hr style="border-color: #444;">
                    <p class="info"><strong>當前拍照頻率:</strong> ${intervalText}</p>
                    
                    <!-- 指令 1: 調整頻率 -->
                    <input type="number" id="interval_${deviceId}" value="60" min="5" ${disabledAttr}> 秒
                    <button class="${btnClass}" ${disabledAttr} onclick="sendCommand('${deviceId}', 'SET_INTERVAL', document.getElementById('interval_${deviceId}').value)">更新頻率</button>
                    
                    <!-- 指令 5: 遠端自毀 -->
                    <button class="btn-stop" onclick="confirmStop('${deviceId}')" style="float: right;">🛑 遠端停止服務</button>
                </div>
            `;
            container.innerHTML += card;
        }

        async function sendCommand(deviceId, command, value) {
            if (command === 'SET_INTERVAL') {
                waitingStates[deviceId] = { expectedInterval: value };
            }
            
            await fetch('/api/command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ deviceId, command, value })
            });
            fetchStatus(); // 立即更新畫面顯示等待中
        }

        function confirmStop(deviceId) {
            // 雙重確認機制
            if (confirm("⚠️ 警告：按下確認後，App 將傳送最後狀態並徹底停止背景服務。\n您確定要自毀嗎？")) {
                sendCommand(deviceId, 'STOP_SERVICE', '');
            }
        }

        fetchStatus();
        setInterval(fetchStatus, 3000); // 每 3 秒拉取一次，讓 UI 反應更靈敏
    </script>
</body>
</html>
