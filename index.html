<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>📱 背景監控中控台</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #1e1e1e;
            color: white;
            padding: 20px;
        }

        .card {
            background: #2d2d2d;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .title {
            color: #4CAF50;
            margin-top: 0;
        }

        .info {
            margin: 8px 0;
            font-size: 16px;
        }

        .offline {
            color: #f44336;
        }

        .online {
            color: #4CAF50;
        }

        .warning {
            color: #FFC107;
        }

        button {
            padding: 8px 15px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-update {
            background-color: #2196F3;
            color: white;
        }

        .btn-stop {
            background-color: #f44336;
            color: white;
        }

        .btn-disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        input[type=number] {
            padding: 6px;
            width: 60px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>
    <h1>🚀 設備狀態中控台</h1>
    <div id="device-container">載入中...</div>

    <script>
        const waitingStates = {};

        async function fetchStatus() {
            try {
                const response = await fetch('/api/status?t=' + new Date().getTime());
                const data = await response.json();
                const container = document.getElementById('device-container');

                if (Object.keys(data).length === 0) {
                    container.innerHTML = '<p>尚未有設備連線...</p>';
                    return;
                }
                if (container.querySelectorAll('.card').length === 0) {
                    container.innerHTML = '';
                }

                for (const [deviceId, info] of Object.entries(data)) {
                    const currentInterval = parseInt(info.photoInterval) || 60;

                    // 處理等待中的指令送達確認
                    if (waitingStates[deviceId]) {
                        const waitInfo = waitingStates[deviceId];
                        const now = new Date().getTime();

                        if (waitInfo.expectedInterval === currentInterval) {
                            delete waitingStates[deviceId];
                        } else if (waitInfo.isStopping && info.isStopping) {
                            delete waitingStates[deviceId];
                        } else if (waitInfo.isRestarting && info.isRestarting) {
                            // 🌟 收到 App 的重啟遺言，解除本地等待狀態
                            delete waitingStates[deviceId];
                        } else if (now - waitInfo.timestamp > 90000) {
                            delete waitingStates[deviceId]; // 超時放棄
                        }
                    }

                    // 🌟 攔截已經停止或正在重啟的設備
                    if (info.isStopping) {
                        renderDeviceCard(container, deviceId, info, currentInterval, "🔴 設備服務已安全中斷與關閉", "offline");
                        continue;
                    }
                    if (info.isRestarting) {
                        // 🌟 當 App 傳回 isRestarting = true 時，顯示重啟中
                        renderDeviceCard(container, deviceId, info, currentInterval, "🔄 設備正在重新啟動中 (約需 3-5 秒)...", "warning");
                        continue;
                    }

                    // 正常運作狀態判斷
                    const lastUpdateTime = new Date(info.lastUpdate).getTime();
                    const isOffline = (new Date().getTime() - lastUpdateTime) > (3 * 60 * 1000);
                    const statusText = isOffline ? '⚠️ 離線 (超過 3 分鐘未回應)' : '🟢 運作正常';
                    const statusColor = isOffline ? 'offline' : 'online';

                    renderDeviceCard(container, deviceId, info, currentInterval, statusText, statusColor);
                }
            } catch (error) { console.error("無法取得狀態:", error); }
        }

        function renderDeviceCard(container, deviceId, info, currentInterval, statusText, statusColor) {
            let card = document.getElementById(`card_${deviceId}`);

            if (!card) {
                card = document.createElement('div');
                card.id = `card_${deviceId}`;
                card.className = 'card';
                card.innerHTML = `
            <h2 class="title">設備: ${info.deviceName}</h2>
            <p class="info"><strong>狀態:</strong> <span id="status_${deviceId}"></span></p>
            <p class="info" style="font-size: 13px; color: #aaa;">🕒 最後更新: <span id="last_update_${deviceId}"></span></p>
            <p class="info"><strong>電量:</strong> <span id="battery_${deviceId}"></span>% | <strong>上傳:</strong> <span id="upload_${deviceId}"></span> 張</p>
            <hr style="border-color: #444;">
            <p class="info"><strong>當前拍照頻率:</strong> <span id="interval_text_${deviceId}"></span></p>
            
            <input type="number" id="interval_input_${deviceId}" min="5" placeholder="輸入秒數"> 秒
            <button id="btn_update_${deviceId}" onclick="sendIntervalCmd('${deviceId}')">更新頻率</button>
            
            <!-- 🌟 加入遠端重啟按鈕 -->
            <button id="btn_restart_${deviceId}" class="btn-update" onclick="confirmRestart('${deviceId}')" style="background-color: #FF9800; float: right; margin-left: 10px;">🔄 遠端重啟</button>
            <button id="btn_stop_${deviceId}" class="btn-stop" onclick="confirmStop('${deviceId}')" style="float: right;">🛑 遠端停止</button>
        `;
                container.appendChild(card);
                document.getElementById(`interval_input_${deviceId}`).value = currentInterval;
            }

            // 取得等待狀態
            const waitInfo = waitingStates[deviceId];
            const isWaitingInterval = waitInfo && waitInfo.expectedInterval;
            const isWaitingStop = waitInfo && waitInfo.isStopping;
            const isWaitingRestart = waitInfo && waitInfo.isRestarting; // 🌟 檢查是否在等重啟

            // 根據等待狀態覆寫 UI 文字
            if (isWaitingStop) {
                statusText = '⏳ 等待自毀指令送達...';
                statusColor = 'warning';
            } else if (isWaitingRestart) {
                statusText = '⏳ 等待重啟指令送達...';
                statusColor = 'warning';
            }

            const intervalText = isWaitingInterval
                ? `<span class="warning">⏳ 變更中 (${currentInterval}s ➔ ${waitInfo.expectedInterval}s)...</span>`
                : `${currentInterval} 秒`;

            // 💥 終極防呆：只要是在「等待指令」、「正在停止」、「正在重啟」，全部強制鎖定按鈕！
            const isDisabled = isWaitingInterval || isWaitingStop || isWaitingRestart || info.isStopping || info.isRestarting;

            // 更新 DOM 文字
            document.getElementById(`last_update_${deviceId}`).innerText = info.lastUpdate;
            document.getElementById(`status_${deviceId}`).innerHTML = statusText;
            document.getElementById(`status_${deviceId}`).className = statusColor;
            document.getElementById(`battery_${deviceId}`).innerText = info.batteryLevel;
            document.getElementById(`upload_${deviceId}`).innerText = info.uploadCount;
            document.getElementById(`interval_text_${deviceId}`).innerHTML = intervalText;

            // 鎖定/解鎖所有控制元件
            const inputEl = document.getElementById(`interval_input_${deviceId}`);
            const btnUpdate = document.getElementById(`btn_update_${deviceId}`);
            const btnStop = document.getElementById(`btn_stop_${deviceId}`);
            const btnRestart = document.getElementById(`btn_restart_${deviceId}`); // 🌟 取得重啟按鈕

            // 防止打字時被刷新覆蓋
            if (!isWaitingInterval && parseInt(inputEl.value) !== currentInterval && document.activeElement !== inputEl) {
                inputEl.value = currentInterval;
            }

            inputEl.disabled = isDisabled;
            btnUpdate.disabled = isDisabled;
            btnStop.disabled = isDisabled;
            btnRestart.disabled = isDisabled; // 🌟 鎖定重啟按鈕

            // 變更按鈕顏色以視覺化鎖定狀態
            btnUpdate.className = isDisabled ? 'btn-disabled' : 'btn-update';
            btnStop.className = isDisabled ? 'btn-disabled' : 'btn-stop';
            btnRestart.style.backgroundColor = isDisabled ? '#555' : '#FF9800'; // 變灰
            btnRestart.style.cursor = isDisabled ? 'not-allowed' : 'pointer';
        }

        function sendIntervalCmd(deviceId) {
            const val = parseInt(document.getElementById(`interval_input_${deviceId}`).value);
            if (isNaN(val) || val < 5) {
                alert("請輸入有效的秒數 (至少 5 秒)");
                return;
            }
            sendCommand(deviceId, 'SET_INTERVAL', val);
        }

        // 🌟 新增重啟確認函式
        function confirmRestart(deviceId) {
            if (confirm("⚠️ 確定要重啟 App 嗎？服務將會中斷，並在 3 秒後自動恢復。")) {
                sendCommand(deviceId, 'RESTART_APP', '');
            }
        }

        function confirmStop(deviceId) {
            if (confirm("⚠️ 確定要發送終極自毀指令嗎？App 將徹底停止並關閉。")) {
                sendCommand(deviceId, 'STOP_SERVICE', '');
            }
        }

        async function sendCommand(deviceId, command, value) {
            // 記錄發出的指令狀態
            if (command === 'SET_INTERVAL') {
                waitingStates[deviceId] = { expectedInterval: parseInt(value), timestamp: new Date().getTime() };
            } else if (command === 'STOP_SERVICE') {
                waitingStates[deviceId] = { isStopping: true, timestamp: new Date().getTime() };
            } else if (command === 'RESTART_APP') {
                waitingStates[deviceId] = { isRestarting: true, timestamp: new Date().getTime() }; // 🌟 記錄重啟等待
            }

            await fetch('/api/command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ deviceId, command, value: value.toString() })
            });
            fetchStatus(); // 立即刷新 UI 顯示鎖定
        }

        fetchStatus();
        setInterval(fetchStatus, 3000);
    </script>
</body>

</html>
